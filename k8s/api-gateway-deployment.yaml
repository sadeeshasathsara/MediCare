apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
data:
  nginx.conf: |
    worker_processes auto;
    events {
        worker_connections 4096;
    }
    http {
        server {
            listen 8080;
            location /api/auth/ {
                proxy_pass http://auth-service:3001/;
            }
            location /api/patients/ {
                proxy_pass http://patient-service:3002/;
            }
            location /api/doctors/ {
                proxy_pass http://doctor-service:3003/;
            }
            location /api/appointments/ {
                proxy_pass http://appointment-service:3004/;
            }
            location /api/telemedicine/ {
                proxy_pass http://telemedicine-service:3005/;
            }
            location /api/payments/ {
                proxy_pass http://payment-service:3006/;
            }
            location /api/notifications/ {
                proxy_pass http://notification-service:3007/;
            }
            location /api/ai/ {
                proxy_pass http://ai-symptom-service:3008/;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: nginx:alpine
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: config-volume
        configMap:
          name: gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
