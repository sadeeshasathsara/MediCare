apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-service
  labels:
    app: ai-symptom-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-service
  template:
    metadata:
      labels:
        app: ai-symptom-service
    spec:
      containers:
        - name: ai-symptom-service
          image: ai-symptom-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3008
          env:
            # Update the MongoDB URI below manually
            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: MONGO_URI_AI
---
apiVersion: v1
kind: Service
metadata:
  name: ai-symptom-service
spec:
  selector:
    app: ai-symptom-service
  ports:
    - protocol: TCP
      port: 3008
      targetPort: 3008


