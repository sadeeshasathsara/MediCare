apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-service
  labels:
    app: ai-symptom-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-service
  template:
    metadata:
      labels:
        app: ai-symptom-service
    spec:
      containers:
        - name: ai-symptom-service
          image: ghcr.io/sadeeshasathsara/medicare/ai-symptom-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3008
          env:
            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: MONGO_URI_AI
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: CORS_ALLOWED_ORIGINS

            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: OPENAI_API_KEY

            - name: OPENAI_MODEL
              value: gpt-4o-mini
            - name: OPENAI_TIMEOUT_MS
              value: "30000"
apiVersion: v1
kind: Service
metadata:
  name: ai-symptom-service
spec:
  selector:
    app: ai-symptom-service
  ports:
    - protocol: TCP
      port: 3008
      targetPort: 3008