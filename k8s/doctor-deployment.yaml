apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-service
  labels:
    app: doctor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctor-service
  template:
    metadata:
      labels:
        app: doctor-service
    spec:
      containers:
        - name: doctor-service
          image: ghcr.io/sadeeshasathsara/medicare/doctor-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
          env:
            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: MONGO_URI_DOCTOR
            - name: MONGO_URI_DOCTOR
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: MONGO_URI_DOCTOR
            - name: DOCTOR_SERVER_PORT
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: DOCTOR_SERVER_PORT
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: CORS_ALLOWED_ORIGINS
            - name: DOCTOR_DEFAULT_SPECIALTIES
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: DOCTOR_DEFAULT_SPECIALTIES
---
apiVersion: v1
kind: Service
metadata:
  name: doctor-service
spec:
  selector:
    app: doctor-service
  ports:
    - protocol: TCP
      port: 3003
      targetPort: 3003