apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/sadeeshasathsara/medicare/notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3007
          env:
            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: MONGO_URI_NOTIFICATION
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: CORS_ALLOWED_ORIGINS
            - name: NOTIFICATION_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: NOTIFICATION_INTERNAL_TOKEN
            - name: NOTIFICATION_SMS_ENABLED
              value: "false"
            - name: NOTIFICATION_PROFILE_LOOKUP_PATIENT_SERVICE_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: NOTIFICATION_PROFILE_LOOKUP_PATIENT_SERVICE_BASE_URL
            - name: NOTIFICATION_PROFILE_LOOKUP_DOCTOR_SERVICE_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: NOTIFICATION_PROFILE_LOOKUP_DOCTOR_SERVICE_BASE_URL
            - name: NOTIFICATION_PROFILE_LOOKUP_ACTOR_USER_ID
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: NOTIFICATION_PROFILE_LOOKUP_ACTOR_USER_ID
            - name: NOTIFICATION_PROFILE_LOOKUP_ACTOR_ROLE
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: NOTIFICATION_PROFILE_LOOKUP_ACTOR_ROLE
            - name: NOTIFICATION_PROFILE_LOOKUP_TIMEOUT_MS
              valueFrom:
                secretKeyRef:
                  name: medicare-secrets
                  key: NOTIFICATION_PROFILE_LOOKUP_TIMEOUT_MS
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 3007
      targetPort: 3007
