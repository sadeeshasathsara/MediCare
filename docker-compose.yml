services:
  # ── SERVICES ──────────────────────────────────────────
  auth-service:
    build: ./services/auth-service
    expose:
      - "3001"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_MS: ${JWT_ACCESS_TTL_MS}
      JWT_REFRESH_TTL_MS: ${JWT_REFRESH_TTL_MS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SPRING_DATA_MONGODB_URI: ${MONGO_URI_AUTH}
      ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      ADMIN_BOOTSTRAP_FULL_NAME: ${ADMIN_BOOTSTRAP_FULL_NAME}

  patient-service:
    build: ./services/patient-service
    expose:
      - "3002"
    env_file:
      - ./services/patient-service/.env
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGO_URI_PATIENT}
    volumes:
      - local-storage:/data/patient-reports

  doctor-service:
    build: ./services/doctor-service
    expose:
      - "3003"
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGO_URI_DOCTOR}

  appointment-service:
    build: ./services/appointment-service
    expose:
      - "3004"
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGO_URI_APPOINTMENT}

  telemedicine-service:
    build: ./services/telemedicine-service
    expose:
      - "3005"
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGO_URI_TELEMEDICINE}
      TELEMEDICINE_NOTIFICATION_ENABLED: ${TELEMEDICINE_NOTIFICATION_ENABLED:-true}
      TELEMEDICINE_NOTIFICATION_BASE_URL: ${TELEMEDICINE_NOTIFICATION_BASE_URL:-http://notification-service:3007}
      TELEMEDICINE_NOTIFICATION_INTERNAL_TOKEN: ${NOTIFICATION_INTERNAL_TOKEN:-change-me-notification-token}
      TELEMEDICINE_NOTIFICATION_TIMEOUT_MS: ${TELEMEDICINE_NOTIFICATION_TIMEOUT_MS:-5000}

  payment-service:
    build: ./services/payment-service
    expose:
      - "3006"
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGO_URI_PAYMENT}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

  notification-service:
    build: ./services/notification-service
    expose:
      - "3007"
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGO_URI_NOTIFICATION}
      NOTIFICATION_INTERNAL_TOKEN: ${NOTIFICATION_INTERNAL_TOKEN:-change-me-notification-token}
      NOTIFICATION_SMS_ENABLED: ${NOTIFICATION_SMS_ENABLED:-false}
      NOTIFICATION_PROFILE_LOOKUP_PATIENT_SERVICE_BASE_URL: ${NOTIFICATION_PROFILE_LOOKUP_PATIENT_SERVICE_BASE_URL:-http://patient-service:3002}
      NOTIFICATION_PROFILE_LOOKUP_DOCTOR_SERVICE_BASE_URL: ${NOTIFICATION_PROFILE_LOOKUP_DOCTOR_SERVICE_BASE_URL:-http://doctor-service:3003}
      NOTIFICATION_PROFILE_LOOKUP_ACTOR_USER_ID: ${NOTIFICATION_PROFILE_LOOKUP_ACTOR_USER_ID:-notification-service}
      NOTIFICATION_PROFILE_LOOKUP_ACTOR_ROLE: ${NOTIFICATION_PROFILE_LOOKUP_ACTOR_ROLE:-ADMIN}
      NOTIFICATION_PROFILE_LOOKUP_TIMEOUT_MS: ${NOTIFICATION_PROFILE_LOOKUP_TIMEOUT_MS:-5000}

  ai-symptom-service:
    build: ./services/ai-symptom-service
    expose:
      - "3008"
    env_file:
      - ./services/ai-symptom-service/.env
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGO_URI_AI}

  # ── API GATEWAY ───────────────────────────────────────
  api-gateway:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - appointment-service
      - telemedicine-service
      - payment-service
      - notification-service
      - ai-symptom-service

volumes:
  local-storage:
    name: local-storage
