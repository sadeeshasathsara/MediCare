worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    log_not_found off;
    types_hash_max_size 2048;
    client_max_body_size 16M;

    # MIME
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Limits
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # GZIP
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    server {
        listen 8080;
        server_name localhost;

        # Security Headers
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Global Proxy Settings
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffers
        proxy_buffers 8 16k;
        proxy_buffer_size 32k;

        # --- Auth (gateway validation) ---
        # Uses auth-service to validate the JWT via an internal subrequest.
        # If valid, auth-service responds 200 and includes X-User-* headers.
        # Those are then forwarded to upstream services.
        location = /_auth {
            internal;
            proxy_pass http://auth-service:3001/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
        }

        # Routing
        # Admin-only auth routes must be authenticated.
        location = /api/auth/verify-doctor {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_auth;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_verified $upstream_http_x_user_verified;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-User-Verified $user_verified;
            proxy_pass http://auth-service:3001/auth/verify-doctor;
        }
        location /api/auth/admin/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_auth;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_verified $upstream_http_x_user_verified;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-User-Verified $user_verified;
            proxy_pass http://auth-service:3001/auth/admin/;
        }
        location /api/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth-service:3001/auth/;
        }
        location /api/patients/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_auth;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_verified $upstream_http_x_user_verified;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-User-Verified $user_verified;
            proxy_pass http://patient-service:3002/;
        }
        location /api/doctors/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_auth;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_verified $upstream_http_x_user_verified;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-User-Verified $user_verified;
            proxy_pass http://doctor-service:3003/;
        }
        location /api/appointments/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_auth;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_verified $upstream_http_x_user_verified;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-User-Verified $user_verified;
            proxy_pass http://appointment-service:3004/;
        }
        location /api/telemedicine/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_auth;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_verified $upstream_http_x_user_verified;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-User-Verified $user_verified;
            proxy_pass http://telemedicine-service:3005/;
        }
        location /api/payments/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_auth;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_verified $upstream_http_x_user_verified;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-User-Verified $user_verified;
            proxy_pass http://payment-service:3006/;
        }
        location /api/notifications/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_auth;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_verified $upstream_http_x_user_verified;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-User-Verified $user_verified;
            proxy_pass http://notification-service:3007/;
        }
        location /api/ai/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_auth;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            auth_request_set $user_verified $upstream_http_x_user_verified;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Role $user_role;
            proxy_set_header X-User-Verified $user_verified;
            proxy_pass http://ai-symptom-service:3008/;
        }
    }
}
