# Payment Service
spring.application.name=payment-service
server.port=${PAYMENT_SERVER_PORT:3006}

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGO_URI_PAYMENT:mongodb://localhost:27017/payment-service}}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}


