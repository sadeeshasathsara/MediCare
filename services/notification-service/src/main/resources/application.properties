# Notification Service
spring.application.name=notification-service
server.port=3007

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/notification-service}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Internal auth
notification.internal.token=${NOTIFICATION_INTERNAL_TOKEN:change-me-notification-token}

# Recipient profile lookup
notification.profile-lookup.patient-service-base-url=${NOTIFICATION_PROFILE_LOOKUP_PATIENT_SERVICE_BASE_URL:http://patient-service:3002}
notification.profile-lookup.doctor-service-base-url=${NOTIFICATION_PROFILE_LOOKUP_DOCTOR_SERVICE_BASE_URL:http://doctor-service:3003}
notification.profile-lookup.actor-user-id=${NOTIFICATION_PROFILE_LOOKUP_ACTOR_USER_ID:notification-service}
notification.profile-lookup.actor-role=${NOTIFICATION_PROFILE_LOOKUP_ACTOR_ROLE:ADMIN}
notification.profile-lookup.timeout-ms=${NOTIFICATION_PROFILE_LOOKUP_TIMEOUT_MS:5000}

# Email provider
notification.email.provider=${NOTIFICATION_EMAIL_PROVIDER:sendgrid}
notification.email.from=${NOTIFICATION_EMAIL_FROM:no-reply@medicare.local}
notification.email.sendgrid.api-key=${SENDGRID_API_KEY:}

# SMS provider
notification.sms.enabled=${NOTIFICATION_SMS_ENABLED:false}
notification.sms.provider=${NOTIFICATION_SMS_PROVIDER:twilio}
notification.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
notification.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
notification.sms.twilio.from-number=${TWILIO_FROM_NUMBER:}
notification.sms.vonage.api-key=${VONAGE_API_KEY:}
notification.sms.vonage.api-secret=${VONAGE_API_SECRET:}
notification.sms.vonage.from=${VONAGE_FROM:}
notification.sms.dialog-genie.api-url=${DIALOG_GENIE_API_URL:}
notification.sms.dialog-genie.api-key=${DIALOG_GENIE_API_KEY:}
notification.sms.dialog-genie.sender-id=${DIALOG_GENIE_SENDER_ID:}

# Worker
notification.worker.fixed-delay-ms=${NOTIFICATION_WORKER_FIXED_DELAY_MS:5000}
notification.worker.batch-size=${NOTIFICATION_WORKER_BATCH_SIZE:25}
notification.worker.max-attempts=${NOTIFICATION_WORKER_MAX_ATTEMPTS:5}
notification.worker.retry-base-delay-ms=${NOTIFICATION_WORKER_RETRY_BASE_DELAY_MS:30000}

# Retention
notification.retention.days=${NOTIFICATION_RETENTION_DAYS:90}


