<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Appointment Confirmed</title>
</head>
<body style="font-family: Arial, sans-serif; color: #1f2937; line-height: 1.5;">
<h2 style="margin-bottom: 8px;">Appointment Confirmed</h2>
<p>Hi {{recipientName}},</p>
<p>Your appointment has been confirmed.</p>
<ul>
    <li><strong>Appointment ID:</strong> {{appointmentId}}</li>
    <li><strong>Date and time:</strong> {{appointmentDateTime}}</li>
    <li><strong>Channel:</strong> {{channel}}</li>
    <li><strong>{{counterpartRole}}:</strong> {{counterpartName}}</li>
    <li><strong>Notes:</strong> {{notes}}</li>
</ul>
<p>Thank you,<br>MediCare Team</p>
</body>
</html>
