# Appointment Service
spring.application.name=appointment-service
server.port=${APPOINTMENT_SERVER_PORT:3004}

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGO_URI_APPOINTMENT:mongodb://localhost:27017/appointment-service}}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Notification service integration
appointment.notification.enabled=${APPOINTMENT_NOTIFICATION_ENABLED:false}
appointment.notification.base-url=${APPOINTMENT_NOTIFICATION_BASE_URL:http://notification-service:3007}
appointment.notification.internal-token=${APPOINTMENT_NOTIFICATION_INTERNAL_TOKEN:}
appointment.notification.timeout-ms=${APPOINTMENT_NOTIFICATION_TIMEOUT_MS:5000}


