# Patient Service
spring.application.name=patient-service
server.port=3002

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/patient-service}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Storage
# Supported: s3, local
patient.storage.provider=${PATIENT_STORAGE_PROVIDER:local}
patient.storage.local-dir=${PATIENT_STORAGE_LOCAL_DIR:./data/patient-reports}
patient.storage.s3.bucket=${S3_BUCKET:}
patient.storage.s3.region=${S3_REGION:us-east-1}
patient.storage.s3.endpoint=${S3_ENDPOINT:}


