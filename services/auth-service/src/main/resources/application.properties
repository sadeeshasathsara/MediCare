# Auth Service
spring.application.name=auth-service
server.port=3001

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/auth-service}

# JWT
jwt.secret=${JWT_SECRET:change_me_to_a_long_random_secret_at_least_32_chars}
# Access token lifetime (ms) - adjust as needed
jwt.expiration=${JWT_ACCESS_TTL_MS:900000}

# Refresh token lifetime (ms)
jwt.refresh-expiration=${JWT_REFRESH_TTL_MS:604800000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}


