# Auth Service
spring.application.name=auth-service
server.port=3001

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/auth-service}

# JWT
jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-32-bytes-minimum}
jwt.expiration-ms=${JWT_EXPIRATION_MS:${JWT_ACCESS_TTL_MS:86400000}}

# Demo users (for local/dev)
auth.seed-demo-users=${AUTH_SEED_DEMO_USERS:true}
auth.demo.password=${AUTH_DEMO_PASSWORD:demo123}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}



