# Telemedicine Service
spring.application.name=telemedicine-service
server.port=3005

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/telemedicine-service}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# JWT (for direct calls without gateway headers)
jwt.secret=${JWT_SECRET:change_me_to_a_long_random_secret_at_least_32_chars}
jwt.issuer=${JWT_ISSUER:auth-service}

# Jitsi
jitsi.domain=${JITSI_DOMAIN:meet.jit.si}
jitsi.app-id=${JITSI_APP_ID:}
jitsi.app-secret=${JITSI_APP_SECRET:}
jitsi.token-validity-minutes=${JITSI_TOKEN_VALIDITY_MINUTES:120}

# Session lifecycle and doctor availability
telemedicine.session.grace-minutes=${TELEMEDICINE_SESSION_GRACE_MINUTES:15}
telemedicine.session.expiry-job-delay-ms=${TELEMEDICINE_SESSION_EXPIRY_JOB_DELAY_MS:60000}
telemedicine.availability.slot-minutes=${TELEMEDICINE_AVAILABILITY_SLOT_MINUTES:30}
telemedicine.availability.start-hour=${TELEMEDICINE_AVAILABILITY_START_HOUR:9}
telemedicine.availability.end-hour=${TELEMEDICINE_AVAILABILITY_END_HOUR:17}
telemedicine.availability.days-ahead=${TELEMEDICINE_AVAILABILITY_DAYS_AHEAD:7}

# Appointment service integration
telemedicine.appointment-service.base-url=${TELEMEDICINE_APPOINTMENT_SERVICE_BASE_URL:http://appointment-service:3004}
telemedicine.appointment.telemedicine-keywords=${TELEMEDICINE_APPOINTMENT_TELEMEDICINE_KEYWORDS:telemedicine,teleconsultation,video consultation,video consult,video call,virtual consultation,online consultation,remote consultation,jitsi}

# Event publishing
telemedicine.broker.enabled=${TELEMEDICINE_BROKER_ENABLED:false}
telemedicine.broker.exchange=${TELEMEDICINE_BROKER_EXCHANGE:telemedicine.events}
telemedicine.broker.routing.appointment-status-updated=${TELEMEDICINE_ROUTING_APPOINTMENT_STATUS:appointment.status.updated}
telemedicine.broker.routing.consultation-completed=${TELEMEDICINE_ROUTING_CONSULTATION_COMPLETED:consultation.completed}
telemedicine.broker.routing.prescription-issued=${TELEMEDICINE_ROUTING_PRESCRIPTION_ISSUED:prescription.issued}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}


