# AI Symptom Service
spring.application.name=ai-symptom-service
server.port=3008

# MongoDB
spring.data.mongodb.uri=mongodb+srv://sadee:sadee@cluster0.rej54xx.mongodb.net/ai-symptom-service?appName=Cluster0

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# OpenAI
openai.api-key=${OPENAI_API_KEY:}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
openai.timeout-ms=${OPENAI_TIMEOUT_MS:30000}

# AI Symptom Checker
ai.symptom.max-response-tokens=${AI_SYMPTOM_MAX_RESPONSE_TOKENS:600}
ai.symptom.system-prompt=You are a medical triage assistant for a healthcare app. Provide a concise risk-aware analysis based on reported symptoms. Include likely causes, urgency level (LOW, MODERATE, HIGH, EMERGENCY), and next steps. Clearly state this is not a diagnosis and advise contacting a licensed clinician. If red-flag symptoms appear, recommend emergency care immediately.


